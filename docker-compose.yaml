version: "3.9"

services:
  redis:
    image: redis:7
    container_name: sticker_redis
    ports:
      - "6379:6379"
    command: redis-server --appendonly yes
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  app:
    image: rroy233/stickerdownloader:latest
    build:
      context: .
      dockerfile: Dockerfile
    container_name: sticker_app
    depends_on:
      redis:
        condition: service_healthy
    env_file:
      - .env
    volumes:
      - ./log:/app/log
      - ./storage:/app/storage

volumes:
  redis_data:
